<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOOLS JB 5IN1 - WIL DEV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600;800&display=swap');
        * {margin:0;padding:0;box-sizing:border-box}
        body {font-family:'Poppins',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;padding:20px}
       .container {max-width:900px;margin:0 auto}
        h1 {font-family:'Orbitron',sans-serif;text-align:center;font-size:28px;color:#ff6a00;margin-bottom:10px;text-shadow:0 0 10px #ff6a00}
       .subtitle {text-align:center;color:#aaa;margin-bottom:30px;font-size:14px}
       .tabs {display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
       .tab {background:#1a1a1a;border:2px solid #333;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:700;transition:0.3s;font-size:14px}
       .tab.active {background:#ff6a00;color:#000;border-color:#ff6a00;box-shadow:0 0 15px #ff6a00}
       .content {display:none;background:#1a1a1a;padding:25px;border-radius:12px;border:2px solid #333}
       .content.active {display:block}
        label {display:block;margin:15px 0 8px;font-weight:600;color:#ff9500;font-size:14px}
        input, select {width:100%;padding:12px;background:#0a0a0a;border:2px solid #333;border-radius:8px;color:#fff;font-family:'Poppins';font-size:15px}
        input:focus, select:focus {outline:none;border-color:#ff6a00}
       .btn {width:100%;padding:15px;background:#ff6a00;color:#000;border:none;border-radius:8px;font-family:'Orbitron';font-weight:900;font-size:16px;cursor:pointer;margin-top:20px;transition:0.3s}
       .btn:hover {background:#ff9500;box-shadow:0 0 20px #ff6a00}
       .preview {margin-top:20px;border:2px solid #ff6a00;border-radius:8px;overflow:hidden;background:#000}
        canvas {width:100%;display:block}
       .footer {text-align:center;margin-top:40px;color:#666;font-size:12px}
    </style>
</head>
<body>
<div class="container">
    <h1>🔥 PAKET STARTER JB 🔥</h1>
    <p class="subtitle">5 TOOLS SULTAN - By WIL DEVELOPMENT</p>

    <div class="tabs">
        <div class="tab active" onclick="openTab(0)">BANNER</div>
        <div class="tab" onclick="openTab(1)">KARTU</div>
        <div class="tab" onclick="openTab(2)">LOGO</div>
        <div class="tab" onclick="openTab(3)">BIO</div>
        <div class="tab" onclick="openTab(4)">QUOTES</div>
    </div>

    <!-- TAB 1: BANNER -->
    <div class="content active">
        <label>Nama JB Lu:</label>
        <input type="text" id="nama1" placeholder="Contoh: WIL DEV">
        <label>Pilih Style:</label>
        <select id="style1">
            <option>Glow Api Oren</option>
            <option>Neon Biru Cyber</option>
            <option>Gold Sultan</option>
        </select>
        <button class="btn" onclick="generateBanner()">GENERATE & DOWNLOAD BANNER</button>
        <div class="preview"><canvas id="canvas1" width="1280" height="720"></canvas></div>
    </div>

    <!-- TAB 2: KARTU -->
    <div class="content">
        <label>Nama JB Lu:</label>
        <input type="text" id="nama2" placeholder="Contoh: WIL DEV">
        <label>Role/Jabatan:</label>
        <input type="text" id="role2" placeholder="Contoh: MC SULTAN">
        <label>No WA:</label>
        <input type="text" id="wa2" placeholder="0821-xxxx-xxxx">
        <button class="btn" onclick="generateKartu()">GENERATE & DOWNLOAD KARTU</button>
        <div class="preview"><canvas id="canvas2" width="1000" height="600"></canvas></div>
    </div>

    <!-- TAB 3: LOGO -->
    <div class="content">
        <label>Teks Logo:</label>
        <input type="text" id="nama3" placeholder="Contoh: WD">
        <label>Tagline:</label>
        <input type="text" id="tag3" placeholder="Contoh: SULTAN JB">
        <button class="btn" onclick="generateLogo()">GENERATE & DOWNLOAD LOGO</button>
        <div class="preview"><canvas id="canvas3" width="800" height="800"></canvas></div>
    </div>

    <!-- TAB 4: BIO -->
    <div class="content">
        <label>Nama JB Lu:</label>
        <input type="text" id="nama4" placeholder="Contoh: WIL DEV">
        <label>Servis/Jualan:</label>
        <input type="text" id="servis4" placeholder="Contoh: Jual Web, MC, SC">
        <label>Nomor WA:</label>
        <input type="text" id="wa4" placeholder="0821-xxxx-xxxx">
        <button class="btn" onclick="generateBio()">GENERATE & DOWNLOAD BIO</button>
        <div class="preview"><canvas id="canvas4" width="1080" height="1920"></canvas></div>
    </div>

    <!-- TAB 5: QUOTES -->
    <div class="content">
        <label>Teks Quotes:</label>
        <input type="text" id="quote5" placeholder="Contoh: Sultan Bukan Kaleng-Kaleng">
        <label>Nama JB Lu:</label>
        <input type="text" id="nama5" placeholder="Contoh: WIL DEV">
        <button class="btn" onclick="generateQuotes()">GENERATE & DOWNLOAD QUOTES</button>
        <div class="preview"><canvas id="canvas5" width="1080" height="1080"></canvas></div>
    </div>

    <p class="footer">© 2026 WIL DEVELOPMENT MAKASSAR - Tools ini 25K. Reseller 5K/biji cuan.</p>
</div>

<script>
// TAB SYSTEM
function openTab(tabIndex) {
  const contents = document.querySelectorAll('.content');
  const tabs = document.querySelectorAll('.tab');
  contents.forEach(c => c.classList.remove('active'));
  tabs.forEach(t => t.classList.remove('active'));
  contents[tabIndex].classList.add('active');
  tabs[tabIndex].classList.add('active');
}

// GENERATE BANNER
function generateBanner(){
  const nama = document.getElementById('nama1').value || 'WIL DEV';
  const style = document.getElementById('style1').value;
  const canvas = document.getElementById('canvas1');
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0,0,1280,720);

  if(style === 'Glow Api Oren'){
    ctx.shadowColor = '#ff6a00';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#ff6a00';
  } else if(style === 'Neon Biru Cyber'){
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#00ffff';
  } else {
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#ffd700';
  }

  ctx.font = '900 100px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillText(nama, 640, 380);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '600 30px Poppins';
  ctx.fillText('SULTAN JB MAKASSAR', 640, 450);

  downloadCanvas(canvas, 'banner-'+nama);
}

// GENERATE KARTU
function generateKartu(){
  const nama = document.getElementById('nama2').value || 'WIL DEV';
  const role = document.getElementById('role2').value || 'MC SULTAN';
  const wa = document.getElementById('wa2').value || '0821-xxxx-xxxx';
  const canvas = document.getElementById('canvas2');
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0,0,1000,600);
  ctx.strokeStyle = '#ff6a00';
  ctx.lineWidth = 8;
  ctx.strokeRect(20,20,960,560);

  ctx.shadowColor = '#ff6a00';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ff6a00';
  ctx.font = '900 70px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillText(nama, 500, 200);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '600 40px Poppins';
  ctx.fillText(role, 500, 300);

  ctx.fillStyle = '#aaa';
  ctx.font = '400 35px Poppins';
  ctx.fillText('WA: ' + wa, 500, 400);

  downloadCanvas(canvas, 'kartu-'+nama);
}

// GENERATE LOGO
function generateLogo(){
  const teks = document.getElementById('nama3').value || 'WD';
  const tag = document.getElementById('tag3').value || 'SULTAN JB';
  const canvas = document.getElementById('canvas3');
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0,0,800,800);

  ctx.strokeStyle = '#ff6a00';
  ctx.lineWidth = 10;
  ctx.shadowColor = '#ff6a00';
  ctx.shadowBlur = 30;
  ctx.beginPath();
  ctx.arc(400,400,250,0,Math.PI*2);
  ctx.stroke();

  ctx.fillStyle = '#ff6a00';
  ctx.font = '900 150px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillText(teks, 400, 430);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '600 40px Poppins';
  ctx.fillText(tag, 400, 550);

  downloadCanvas(canvas, 'logo-'+teks);
}

// GENERATE BIO
function generateBio(){
  const nama = document.getElementById('nama4').value || 'WIL DEV';
  const servis = document.getElementById('servis4').value || 'Jual Web, MC, SC';
  const wa = document.getElementById('wa4').value || '0821-xxxx-xxxx';
  const canvas = document.getElementById('canvas4');
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0,0,1080,1920);

  ctx.shadowColor = '#ff6a00';
  ctx.shadowBlur = 40;
  ctx.fillStyle = '#ff6a00';
  ctx.font = '900 90px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillText(nama, 540, 400);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '600 50px Poppins';
  ctx.fillText('🔥 ' + servis, 540, 800);

  ctx.fillStyle = '#ff9500';
  ctx.font = '600 55px Poppins';
  ctx.fillText('📱 ' + wa, 540, 1000);

  ctx.fillStyle = '#aaa';
  ctx.font = '400 40px Poppins';
  ctx.fillText('#SultanJB #Makassar', 540, 1600);

  downloadCanvas(canvas, 'bio-'+nama);
}

// GENERATE QUOTES
function generateQuotes(){
  const quote = document.getElementById('quote5').value || 'Sultan Bukan Kaleng-Kaleng';
  const nama = document.getElementById('nama5').value || 'WIL DEV';
  const canvas = document.getElementById('canvas5');
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0,0,1080,1080);

  ctx.fillStyle = '#fff';
  ctx.font = '600 60px Poppins';
  ctx.textAlign = 'center';
  wrapText(ctx, '"' + quote + '"', 540, 400, 900, 80);

  ctx.shadowColor = '#ff6a00';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ff6a00';
  ctx.font = '900 50px Orbitron';
  ctx.fillText('- ' + nama + ' -', 540, 800);

  downloadCanvas(canvas, 'quotes-'+nama);
}

// HELPER
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for(let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}

function downloadCanvas(canvas, filename){
  const link = document.createElement('a');
  link.download = filename + '-sultan.png';
  link.href = canvas.toDataURL();
  link.click();
}
</script>
</body>
